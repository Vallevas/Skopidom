version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infrastructure/postgres/queries"
    schema: "internal/infrastructure/postgres/migrations"
    gen:
      go:
        package: "db"
        out: "internal/infrastructure/postgres/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
